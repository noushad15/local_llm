version: '3.9'

services:
  ollama_l:
    image: ollama/ollama:latest
    container_name: ollama_l
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - app-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama_l:11434
    depends_on:
      - ollama_l
    restart: unless-stopped
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      -  ../.env
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      - ollama_l
      - qdrant
    environment:
      - OLLAMA_BASE_URL=http://ollama_l:11434
      - QDRANT_URL=http://qdrant:6333
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - app-network

volumes:
  ollama_data:
  qdrant_data:

networks:
  app-network:
    driver: bridge